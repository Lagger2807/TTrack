<html>
    <head>
        <title>Page not found</title>
        <style>
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
                font-family: 'Verdana';
            }

            h1 {
                font-weight: 500;
                animation: rotate 3s infinite linear;
            }

            @keyframes rotate {
                0% {
                    transform: rotate3d(0, 1, 0, 0deg);
                }

                100% {
                    transform: rotate3d(0, 1, 0, 360deg);
                }

                
            }
        </style>
    </head>
    <body>
        <h1>Page not found</h1>
    </body>
</html>
